<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gauntlet Proto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: monospace;
      color: #aaa;
      user-select: none;
    }

    /* ── Lobby ── */
    #lobby { display: flex; flex-direction: column; align-items: center; gap: 28px; }
    #lobby h1 { font-size: 22px; letter-spacing: 0.2em; color: #ddd; text-transform: uppercase; }
    #nameRow { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #666; }
    #nameInput {
      background: #1a1a1a; border: 1px solid #333; color: #ddd;
      font-family: monospace; font-size: 14px; padding: 6px 10px;
      width: 120px; outline: none; letter-spacing: 0.05em;
    }
    #nameInput:focus { border-color: #555; }
    #classGrid { display: grid; grid-template-columns: repeat(4, 110px); gap: 10px; }
    .classCard {
      background: #141414; border: 1px solid #2a2a2a; padding: 14px 10px 12px;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px;
      transition: border-color 0.1s, background 0.1s; user-select: none;
    }
    .classCard:hover  { border-color: #444; background: #1a1a1a; }
    .classCard.selected { border-color: var(--cls-color); background: #1a1a1a; }
    .classCard canvas { display: block; }
    .cardName { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #888; }
    .classCard.selected .cardName { color: var(--cls-color); }
    .cardDesc { font-size: 10px; color: #444; text-align: center; line-height: 1.5; }
    .classCard.selected .cardDesc { color: #666; }
    #enterBtn {
      background: #1a1a1a; border: 1px solid #333; color: #888;
      font-family: monospace; font-size: 12px; letter-spacing: 0.15em;
      padding: 8px 28px; cursor: pointer; text-transform: uppercase;
      transition: border-color 0.1s, color 0.1s;
    }
    #enterBtn:hover:not(:disabled) { border-color: #555; color: #ccc; }
    #enterBtn:disabled { opacity: 0.3; cursor: default; }
    #lobbyStatus { font-size: 11px; color: #444; height: 14px; }

    /* ── Game ── */
    #game { display: none; flex-direction: column; align-items: center; }
    #game.active { display: flex; }
    #ui {
      margin-bottom: 8px; font-size: 13px; letter-spacing: 0.05em;
      display: flex; gap: 16px; align-items: center;
    }
    #hpBar { width: 100px; height: 8px; background: #333; border: 1px solid #555; border-radius: 2px; overflow: hidden; }
    #hpFill { height: 100%; background: #2a9d8f; transition: width 0.1s ease; }
    #hpText { font-size: 11px; color: #666; min-width: 36px; }
    #chargeWrap { display: flex; align-items: center; gap: 6px; opacity: 0; transition: opacity 0.1s; }
    #chargeWrap.visible { opacity: 1; }
    #chargeLabel { font-size: 10px; color: #555; }
    #chargeBar { width: 80px; height: 6px; background: #222; border: 1px solid #333; border-radius: 1px; overflow: hidden; }
    #chargeFill { height: 100%; width: 0%; background: #888; transition: background 0.1s; }
    #cooldowns { display: flex; gap: 8px; align-items: center; }
    .cd-pip { font-size: 10px; color: #333; border: 1px solid #222; padding: 2px 5px; border-radius: 2px; }
    .cd-pip.ready { color: #666; border-color: #444; }
    canvas#gameCanvas { background: #111; border: 1px solid #333; display: block; cursor: crosshair; }
    #deathScreen {
      display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.75);
      flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; color: #e63946; font-size: 28px; letter-spacing: 0.1em; pointer-events: none;
    }
    #deathScreen.visible { display: flex; }
    #deathScreen span { font-size: 13px; color: #666; letter-spacing: 0.05em; }
    #legend { margin-top: 10px; display: flex; gap: 20px; font-size: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    #enemyLegend { margin-top: 6px; display: flex; gap: 20px; font-size: 11px; color: #555; }
    .el-item { display: flex; align-items: center; gap: 5px; }
    .el-dot { width: 8px; height: 8px; border-radius: 50%; }
    #controls { margin-top: 6px; font-size: 11px; color: #3a3a3a; }
  </style>
</head>
<body>

<!-- ── Lobby ── -->
<div id="lobby">
  <h1>Gauntlet</h1>
  <div id="nameRow">
    <span>handle</span>
    <input id="nameInput" type="text" maxlength="8" placeholder="anon" autocomplete="off" spellcheck="false">
    <span style="color:#2a2a2a">8 chars max</span>
  </div>
  <div id="classGrid"></div>
  <div id="lobbyStatus"></div>
  <button id="enterBtn" disabled>enter the dungeon</button>
</div>

<!-- ── Game ── -->
<div id="game">
  <div id="ui">
    <span id="classLabel">—</span>
    <div id="hpBar"><div id="hpFill"></div></div>
    <span id="hpText">10/10</span>
    <div id="chargeWrap">
      <span id="chargeLabel">charge</span>
      <div id="chargeBar"><div id="chargeFill"></div></div>
    </div>
    <div id="cooldowns">
      <div class="cd-pip" id="cd1">1</div>
      <div class="cd-pip" id="cd2">2</div>
    </div>
    <span id="blockCount" style="font-size:11px;color:#555;">blocks: 10</span>
  </div>
  <div style="position:relative;">
    <canvas id="gameCanvas"></canvas>
    <div id="deathScreen">
      YOU DIED
      <span id="respawnCountdown">respawning in 3s...</span>
    </div>
  </div>
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#e63946"></div>warrior</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2a9d8f"></div>ranger</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9b5de5"></div>mage</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f4a261"></div>rogue</div>
  </div>
  <div id="enemyLegend">
    <div class="el-item"><div class="el-dot" style="background:#ffcc00"></div>runner</div>
    <div class="el-item"><div class="el-dot" style="background:#ff4444"></div>grunt</div>
    <div class="el-item"><div class="el-dot" style="background:#ff8800"></div>brute</div>
  </div>
  <div id="controls">WASD · left click primary · right click hold/release secondary · mouse aims · E place block</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<!-- ── Lobby Script ── -->
<script>
const CLASS_DEFS = {
  warrior: { color: '#e63946', desc: 'Takes hits,\ndishes them back' },
  ranger:  { color: '#2a9d8f', desc: 'Keeps distance,\nkites' },
  mage:    { color: '#9b5de5', desc: 'Area damage,\nfragile' },
  rogue:   { color: '#f4a261', desc: 'Reads the room,\nbackstabs' },
};

function drawClassShape(canvas, cls, color, size) {
  const ctx = canvas.getContext('2d');
  const cx = size/2, cy = size/2;
  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = color;
  switch (cls) {
    case 'warrior': { const s=size*0.52; ctx.fillRect(cx-s/2, cy-s/2, s, s); break; }
    case 'ranger': {
      const r=size*0.42;
      ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r*0.866,cy+r*0.5); ctx.lineTo(cx-r*0.866,cy+r*0.5); ctx.closePath(); ctx.fill(); break;
    }
    case 'mage': {
      const r=size*0.42;
      ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r,cy); ctx.lineTo(cx,cy+r); ctx.lineTo(cx-r,cy); ctx.closePath(); ctx.fill(); break;
    }
    case 'rogue': {
      const r=size*0.42;
      ctx.beginPath();
      for (let i=0;i<5;i++){const a=(i*2*Math.PI/5)-Math.PI/2; i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
      ctx.closePath(); ctx.fill(); break;
    }
  }
}

window.selectedClass = null;
const grid      = document.getElementById('classGrid');
const enterBtn  = document.getElementById('enterBtn');
const nameInput = document.getElementById('nameInput');

for (const [cls, def] of Object.entries(CLASS_DEFS)) {
  const card = document.createElement('div');
  card.className = 'classCard';
  card.style.setProperty('--cls-color', def.color);
  card.dataset.cls = cls;
  const sc = document.createElement('canvas');
  sc.width = sc.height = 48;
  drawClassShape(sc, cls, def.color, 48);
  const nameEl = document.createElement('div');
  nameEl.className = 'cardName'; nameEl.textContent = cls;
  const descEl = document.createElement('div');
  descEl.className = 'cardDesc'; descEl.textContent = def.desc;
  card.append(sc, nameEl, descEl);
  card.addEventListener('click', () => {
    document.querySelectorAll('.classCard').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    window.selectedClass = cls;
    enterBtn.disabled = false;
  });
  grid.appendChild(card);
}

nameInput.addEventListener('input', () => {
  nameInput.value = nameInput.value.replace(/[^a-zA-Z0-9_\-]/g, '').slice(0, 8);
});
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter' && selectedClass) enterBtn.click(); });
</script>

<!-- ── Game Script ── -->
<script src="/game.js"></script>

</body>
</html>
